  font-size:13px;
  font-weight:800;
  letter-spacing:3px;
  text-transform:uppercase;
  padding:7px 18px;
  border-radius:20px;
  margin-bottom:22px;
  font-family:system-ui,sans-serif;
}
.ovl-live-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:#ef4444;
  animation:ovl-pulse 1.4s ease-in-out infinite;
}
@keyframes ovl-pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.7)}
}
.ovl-canal{
  font-size:15px;
  color:rgba(255,220,80,0.75);
  letter-spacing:5px;
  text-transform:uppercase;
  font-family:system-ui,sans-serif;
  font-weight:700;
  margin-bottom:12px;
}
.ovl-title{
  font-size:clamp(28px,6vw,46px);
  font-weight:900;
  color:#ffffff;
  font-family:system-ui,sans-serif;
  line-height:1.1;
  letter-spacing:-0.5px;
  margin-bottom:14px;
}
.ovl-sub{
  font-size:clamp(16px,2.5vw,20px);
  color:#a3e635;
  font-family:system-ui,sans-serif;
  letter-spacing:0.5px;
  margin-bottom:22px;
  font-weight:600;
}
.ovl-divider{
  width:48px;
  height:1px;
  background:rgba(255,255,255,0.12);
  margin-bottom:22px;
}
.ovl-hint{
  font-size:clamp(15px,2.2vw,18px);
  color:#e2e8f0;
  font-family:system-ui,sans-serif;
  font-weight:600;
  margin-bottom:16px;
  letter-spacing:0.3px;
}
.ovl-hint2{
  font-size:clamp(13px,2vw,15px);
  color:#a3e635;
  font-family:system-ui,sans-serif;
  font-weight:600;
  margin-bottom:24px;
  letter-spacing:0.3px;
}
.ovl-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:#16a34a;
  color:#fff;
  border:none;
  border-radius:40px;
  padding:20px 52px;
  font-size:18px;
  font-weight:800;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform 0.15s,background 0.2s;
  text-decoration:none;
  font-family:system-ui,sans-serif;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  width:100%;
  max-width:360px;
  min-height:62px;
  box-sizing:border-box;
}
.ovl-btn:hover{background:#15803d;transform:scale(1.03)}
.ovl-btn:active{transform:scale(0.97)}
.ovl-btn::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.13),transparent);
  transform:translateX(-100%);
  animation:ovl-shimmer 2.8s ease-in-out infinite;
}
@keyframes ovl-shimmer{
  0%{transform:translateX(-100%)}
  55%,100%{transform:translateX(120%)}
}
.ovl-footer{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:26px;
  flex-wrap:wrap;
  justify-content:center;
}
.ovl-badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border:1.5px solid;
  font-size:13px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  padding:8px 16px;
  border-radius:20px;
  font-family:system-ui,sans-serif;
}
.ovl-badge-hd{color:#93c5fd;border-color:rgba(147,197,253,0.4);background:rgba(147,197,253,0.08)}
.ovl-badge-live{color:#fca5a5;border-color:rgba(252,165,165,0.4);background:rgba(252,165,165,0.08)}
.ovl-badge-free{color:#86efac;border-color:rgba(134,239,172,0.4);background:rgba(134,239,172,0.08)}
.ovl-badge-dot{width:7px;height:7px;border-radius:50%}
.ovl-histats{
  margin-top:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0.6;
}
@media(max-width:480px){
  .ovl-box{padding:30px 18px}
  .ovl-btn{font-size:16px;padding:18px 24px;max-width:100%;min-height:56px}
  .ovl-lb2,.ovl-lb4{display:none}
  .ovl-badge{font-size:12px;padding:7px 13px}
}
@media(max-width:360px){
  .ovl-lb1,.ovl-lb3{display:none}
  .ovl-btn{font-size:15px;min-height:52px}
}

    <style>
        :root {
            --accent: #00d4ff;
            --accent-dim: rgba(0,212,255,0.5);
            --accent-faint: rgba(0,212,255,0.08);
            --bg-deep: #061020;
            --bg-mid:  #0a1628;
            --bg-top:  #0d1b3e;
            --card-bg: rgba(255,255,255,0.045);
            --card-border: rgba(255,255,255,0.09);
            --red: #f07070;
            --red-bg: rgba(200,60,60,0.14);
            --red-border: rgba(200,60,60,0.32);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        #player {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            border: 0; overflow: hidden;
            opacity: 0;
            transition: opacity 0.45s ease;
        }
        #player.visible { opacity: 1; }

        .dsn-overlay {
            position: fixed; inset: 0; z-index: 9000;
            background:
                radial-gradient(ellipse at 50% 38%, var(--accent-faint) 0%, transparent 62%),
                linear-gradient(160deg, var(--bg-top) 0%, var(--bg-mid) 50%, var(--bg-deep) 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.7s ease, visibility 0.7s ease;
        }
        .dsn-overlay.hidden   { opacity: 0; visibility: hidden; pointer-events: none; }
        .dsn-overlay.inactive { display: none; }
        .dots-wrap {
            display: flex; align-items: center;
            gap: clamp(14px, 4vw, 22px);
            margin-bottom: clamp(24px, 5vw, 36px);
        }
        .dot {
            width:  clamp(16px, 4vw, 22px);
            height: clamp(16px, 4vw, 22px);
            border-radius: 50%;
            background: var(--accent);
            will-change: transform, opacity;
            animation: dotPulse 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: .22s; }
        .dot:nth-child(3) { animation-delay: .44s; }

        @keyframes dotPulse {
            0%,100% { transform: scale(.55); opacity: .22; box-shadow: 0 0 6px 2px rgba(0,212,255,.18); }
            50%      { transform: scale(1.18); opacity: 1;   box-shadow: 0 0 22px 8px rgba(0,212,255,.55); }
        }

        .loader-label {
            display: flex; flex-direction: column;
            align-items: center; gap: clamp(6px, 1.5vw, 10px);
        }
        .loader-text {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 700;
            color: rgba(255,255,255,.9);
            letter-spacing: .03em;
        }
        .loader-sub {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: clamp(13px, 2.5vw, 17px);
            font-weight: 400;
            color: rgba(0,212,255,.52);
            letter-spacing: .22em;
            text-transform: uppercase;
        }
        .status-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: clamp(14px, 3vw, 20px);
            padding: clamp(24px, 5vw, 44px) clamp(20px, 5vw, 40px);
            width: min(440px, calc(100vw - 32px));
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
        }

        .status-thumb {
            width: 100%; aspect-ratio: 16/9;
            border-radius: clamp(8px, 2vw, 12px);
            overflow: hidden;
            margin-bottom: clamp(18px, 4vw, 28px);
            background: rgba(255,255,255,.05);
            display: none;
        }
        .status-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .status-thumb.show { display: block; }

        .status-badge {
            display: inline-flex; align-items: center;
            gap: 7px;
            padding: clamp(5px,1.2vw,7px) clamp(14px,3vw,20px);
            border-radius: 999px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: clamp(11px, 2vw, 13px);
            font-weight: 700; letter-spacing: .14em;
            text-transform: uppercase;
            margin-bottom: clamp(14px, 3vw, 20px);
        }
        .status-badge.soon  { background: rgba(0,180,216,.16); border: 1px solid rgba(0,212,255,.38); color: var(--accent); }
        .status-badge.ended { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }

        .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .badge-dot.pulse { animation: bdPulse 1.8s ease-in-out infinite; }
        @keyframes bdPulse { 0%,100%{ opacity:.38; transform:scale(.75); } 50%{ opacity:1; transform:scale(1.3); } }

        .status-title {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: clamp(17px, 4vw, 24px);
            font-weight: 700;
            color: rgba(255,255,255,.92);
            line-height: 1.35;
            margin-bottom: clamp(10px, 2.5vw, 16px);
        }

        .status-display-time {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: clamp(32px, 8vw, 52px);
            font-weight: 800; color: #fff;
            letter-spacing: .02em; line-height: 1;
            margin-bottom: clamp(6px, 1.5vw, 10px);
            display: none;
        }
        .status-display-time.show { display: block; }

        .status-data-full {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: clamp(13px, 2.5vw, 16px);
            color: rgba(255,255,255,.38);
            display: none;
        }
        .status-data-full.show { display: block; }

        .status-ended-icon {
            width: clamp(52px, 12vw, 68px); height: clamp(52px, 12vw, 68px);
            border-radius: 50%;
            background: var(--red-bg); border: 1px solid var(--red-border);
            display: none; align-items: center; justify-content: center;
            margin-bottom: clamp(14px, 3vw, 20px);
        }
        .status-ended-icon.show { display: flex; }
        .status-ended-icon svg { width: clamp(24px,5vw,32px); height: clamp(24px,5vw,32px); fill: var(--red); }

        .status-sub {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: clamp(13px, 2.5vw, 16px);
            color: rgba(255,255,255,.32);
            margin-top: clamp(8px, 2vw, 12px);
            line-height: 1.5;
            display: none;
        }
        .status-sub.show { display: block; }
		.btn-eventos {
		    display: none;
		    margin-top: clamp(16px, 3.5vw, 24px);
		    padding: clamp(11px,2.5vw,14px) clamp(22px,5vw,32px);
		    border-radius: 999px;
		    background: transparent;
		    border: 1.5px solid rgba(255,255,255,0.22);
		    color: rgba(255,255,255,0.72);
		    font-family: system-ui, -apple-system, sans-serif;
		    font-size: clamp(11px, 2vw, 13px);
		    font-weight: 700;
		    letter-spacing: .13em;
		    text-transform: uppercase;
		    text-decoration: none;
		    cursor: pointer;
		    animation: btnPulse 2.4s ease-in-out infinite;
		    transition: background .2s ease, border-color .2s ease, color .2s ease, animation-play-state .2s;
		    -webkit-tap-highlight-color: transparent;
		}
		.btn-eventos:hover, .btn-eventos:active {
		    background: rgba(255,255,255,0.08);
		    border-color: rgba(255,255,255,0.55);
		    color: #fff;
		    animation-play-state: paused;
		}
		.btn-eventos.show { display: inline-flex; align-items: center; gap: 8px; }
		
		@keyframes btnPulse {
		    0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.0);  border-color: rgba(255,255,255,0.22); opacity: 0.75; }
		    50%      { box-shadow: 0 0 0 6px rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.48); opacity: 1;    }
		}
        .btn-eventos:hover, .btn-eventos:active {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.45);
            color: #fff;
        }
        .btn-eventos.show { display: inline-flex; align-items: center; gap: 8px; }
        @media (min-width: 1400px) {
            .status-card { width: min(520px, calc(100vw - 40px)); }
            .loader-text { font-size: 40px; }
            .loader-sub  { font-size: 20px; }
        }
        @media (max-height: 500px) and (orientation: landscape) {
            .status-card { padding: 16px 20px; }
            .status-thumb { aspect-ratio: 21/9; margin-bottom: 12px; }
            .status-display-time { font-size: 26px; }
            .status-title { font-size: 15px; margin-bottom: 6px; }
            .loader-text { font-size: 20px; }
            .dots-wrap { margin-bottom: 14px; }
        }
        @supports (padding: env(safe-area-inset-bottom)) {
            .dsn-overlay {
                padding-bottom: env(safe-area-inset-bottom);
                padding-left:   env(safe-area-inset-left);
                padding-right:  env(safe-area-inset-right);
            }
        }
	    #histats_counter {
	      display: none;
	    }
    </style>

          return null;
