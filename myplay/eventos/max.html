  <style>
    .meu-overlay-player {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      overflow: hidden;
      background: #050e05;
    }
    .ovl-lights {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 140px;
      pointer-events: none;
    }
    .ovl-beam {
      position: absolute;
      top: 0;
      width: 2px;
      height: 115px;
      background: linear-gradient(180deg, rgba(255,220,80,0.52), transparent);
      transform-origin: top center;
    }
    .ovl-beam::before {
      content: '';
      position: absolute;
      top: -5px; left: -4px;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ffe040;
      box-shadow: 0 0 14px 5px rgba(255,220,80,0.75);
    }
    .ovl-lb1 { left: 6%; transform: rotate(14deg); }
    .ovl-lb2 { left: 21%; transform: rotate(7deg); }
    .ovl-lb3 { right: 6%; transform: rotate(-14deg); }
    .ovl-lb4 { right: 21%; transform: rotate(-7deg); }
    .ovl-lb5 { left: 50%; transform: translateX(-50%); }
    .ovl-grass {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background:
        linear-gradient(180deg, transparent, rgba(10,55,10,0.4)),
        repeating-linear-gradient(90deg, #1a5c1a 0, #1a5c1a 44px, #0e3d0e 44px, #0e3d0e 88px);
      opacity: 0.13;
      pointer-events: none;
    }
    .ovl-box {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 44px 32px;
      width: 100%;
      max-width: 580px;
      box-sizing: border-box;
      text-align: center;
    }
    .ovl-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(220,38,38,0.2);
      border: 1px solid rgba(220,38,38,0.5);
      color: #fca5a5;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: 20px;
      margin-bottom: 22px;
      font-family: system-ui, sans-serif;
    }
    .ovl-live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: ovl-pulse 1.4s ease-in-out infinite;
    }
    @keyframes ovl-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .4; transform: scale(.7); }
    }
    .ovl-title {
      font-size: clamp(28px, 6vw, 46px);
      font-weight: 900;
      color: #ffffff;
      font-family: system-ui, sans-serif;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 22px;
    }
    .ovl-divider {
      width: 48px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin-bottom: 22px;
    }
    .ovl-hint {
      font-size: clamp(15px, 2.2vw, 18px);
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .ovl-hint2 {
      font-size: clamp(13px, 2vw, 15px);
      color: #a3e635;
      font-family: system-ui, sans-serif;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .ovl-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 40px;
      padding: 20px 52px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, background 0.2s;
      text-decoration: none;
      font-family: system-ui, sans-serif;
      touch-action: manipulation;
      width: 100%;
      max-width: 360px;
      min-height: 62px;
      box-sizing: border-box;
    }
    .ovl-btn:hover { background: #15803d; transform: scale(1.03); }
    .ovl-btn:active { transform: scale(0.97); }
    .ovl-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.13), transparent);
      transform: translateX(-100%);
      animation: ovl-shimmer 2.8s ease-in-out infinite;
    }
    @keyframes ovl-shimmer {
      0% { transform: translateX(-100%); }
      55%, 100% { transform: translateX(120%); }
    }
    .ovl-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 26px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ovl-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1.5px solid;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: system-ui, sans-serif;
    }
    .ovl-badge-hd { color: #93c5fd; border-color: rgba(147,197,253,0.4); background: rgba(147,197,253,0.08); }
    .ovl-badge-live { color: #fca5a5; border-color: rgba(252,165,165,0.4); background: rgba(252,165,253,0.08); }
    .ovl-badge-free { color: #86efac; border-color: rgba(134,239,172,0.4); background: rgba(134,239,172,0.08); }
    .ovl-badge-dot { width: 7px; height: 7px; border-radius: 50%; }
    .ovl-histats {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0.6;
    }
    @media (max-width: 480px) {
      .ovl-box { padding: 30px 18px; }
      .ovl-btn { font-size: 16px; padding: 18px 24px; max-width: 100%; min-height: 56px; }
      .ovl-lb2, .ovl-lb4 { display: none; }
      .ovl-badge { font-size: 12px; padding: 7px 13px; }
    }
    @media (max-width: 360px) {
      .ovl-lb1, .ovl-lb3 { display: none; }
      .ovl-btn { font-size: 15px; min-height: 52px; }
    }

    /* ===== ESTILOS DO AVISO DE ADBLOCK ===== */
    .adblock-warning {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100000;
      background: #0f0f0f;
      border: 2px solid #f87171;
      border-radius: 24px;
      padding: 28px 32px;
      text-align: center;
      font-family: system-ui, sans-serif;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 35px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      background-color: rgba(0,0,0,0.92);
    }
    .adblock-warning h3 {
      color: #f87171;
      font-size: 26px;
      margin: 0 0 12px 0;
      font-weight: 800;
    }
    .adblock-warning p {
      color: #e2e8f0;
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .adblock-warning button {
      background: #f87171;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      padding: 12px 28px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }
    .adblock-warning button:hover {
      background: #ef4444;
      transform: scale(1.02);
    }
    .warning-overlay-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 99999;
      backdrop-filter: blur(3px);
    }
  </style>
