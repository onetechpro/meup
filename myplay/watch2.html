            padding: 0;
            overflow: hidden;
            background-color: #000000;

        }
        #player {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
        #player iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;

        }
        #iframe {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 400px;
        }
        html, body, .main, .main iframe {
            width: 100%;
            height: 100%;
        }
        h1, h2 {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
          margin-top: 2rem;
          font-size: clamp(1rem, 5vw, 2.5rem);

          text-align: center;

          background: linear-gradient(
            270deg,
            #ff6ec4,
            #7873f5,
            #42e695,
            #ff6ec4
          );
          background-size: 400% 100%;
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          animation: shimmer 8s ease-in-out infinite;
        }
        
        @keyframes shimmer {
          0% {

   .site-layer-bg {
    position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center; padding: 12px;
    box-sizing: border-box;
  }
  .site-notice-box {
    position: relative; z-index: 100000; background: #0f0f0f;
    border: 1.5px solid #f87171; border-radius: 16px;
    padding: 24px 20px; text-align: center;
    font-family: system-ui, sans-serif;
    width: 100%; max-width: 420px;
    max-height: calc(100vh - 24px);
    overflow-y: auto; overflow-x: hidden;
    box-sizing: border-box;
    box-shadow: 0 16px 40px rgba(0,0,0,.8);
    animation: fadeUp .25s ease;
    scrollbar-width: none;
  }
  .site-notice-box::-webkit-scrollbar { display: none; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .snb-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: clamp(36px,8vw,52px); height: clamp(36px,8vw,52px);
    border-radius: 50%; background: rgba(248,113,113,.12);
    border: 1.5px solid rgba(248,113,113,.3);
    font-size: clamp(18px,4vw,24px); margin-bottom: 12px;
  }
  .snb-title {
    color: #f87171; font-size: clamp(14px,3.5vw,20px);
    margin: 0 0 8px; font-weight: 800; line-height: 1.2;
  }
  .snb-desc {
    color: #94a3b8; font-size: clamp(11px,2.5vw,13px);
    line-height: 1.55; margin-bottom: 16px;
  }
  .snb-desc strong { color: #e2e8f0; }
  .snb-divider { width: 32px; height: 2px; background: rgba(248,113,113,.3); border-radius: 2px; margin: 0 auto 14px; }

  .snb-accordion { border: 1px solid rgba(248,113,113,.2); border-radius: 10px; margin-bottom: 16px; overflow: hidden; text-align: left; }
  .snb-acc-trigger {
    width: 100%; background: rgba(248,113,113,.08); border: none;
    padding: 9px 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    color: #f87171; font-size: clamp(10px,2.3vw,12px); font-weight: 700;
    font-family: system-ui, sans-serif; transition: background .2s;
  }
  .snb-acc-trigger:hover { background: rgba(248,113,113,.14); }
  .snb-acc-arrow {
    flex-shrink: 0; width: 14px; height: 14px;
    border-right: 2px solid #f87171; border-bottom: 2px solid #f87171;
    transform: rotate(45deg); transition: transform .25s; margin-top: -3px;
  }
  .snb-acc-arrow.open { transform: rotate(-135deg); margin-top: 3px; }
  .snb-acc-body { max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s ease; padding: 0 12px; box-sizing: border-box; }
  .snb-acc-body.open { max-height: 600px; padding: 10px 12px; }

  .snb-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .snb-tab {
    padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1);
    background: transparent; color: #94a3b8;
    font-size: clamp(9px,2vw,11px); cursor: pointer; font-family: system-ui, sans-serif;
    transition: background .2s, color .2s;
  }
  .snb-tab.active { background: rgba(248,113,113,.15); color: #f87171; border-color: rgba(248,113,113,.3); }
  .snb-tab-content { display: none; }
  .snb-tab-content.active { display: block; }
  .snb-guide-step {
    display: flex; align-items: flex-start; gap: 7px;
    font-size: clamp(9px,2.2vw,11px); color: #94a3b8; line-height: 1.5; margin-bottom: 6px;
  }
  .snb-guide-num {
    flex-shrink: 0; width: 16px; height: 16px; border-radius: 50%;
    background: rgba(255,255,255,.06); color: #64748b;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .snb-guide-step strong { color: #cbd5e1; }

  .snb-reload-hint {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px; padding: 12px 14px;
    font-size: clamp(10px,2.4vw,13px); color: #94a3b8; line-height: 1.5;
  }
  .snb-reload-hint .snb-reload-icon { font-size: clamp(16px,3.5vw,20px); flex-shrink: 0; }
  .snb-reload-hint strong { color: #e2e8f0; }

  .ui-frozen { pointer-events: none; user-select: none; }
  .site-layer-bg * { pointer-events: auto; }
  #player { display: none; }
